<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="auth-brand__icon">🐾</span>
      <span class="auth-brand__name">CatDog</span>
    </div>

    <h1 class="auth-title">Redefinir senha</h1>

    <div class="token-error" *ngIf="!token" role="alert">
      <p>Link inválido ou expirado.</p>
      <a routerLink="/auth/login" class="auth-footer__link">Solicitar novo link</a>
    </div>

    <form *ngIf="token" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="form-group">
        <label class="form-label" for="reset-password">Nova Senha</label>
        <input
          id="reset-password"
          class="form-input"
          [class.form-input--error]="getPasswordError()"
          type="password"
          formControlName="password"
          placeholder="Mínimo 7 caracteres"
          autocomplete="new-password"
        />
        <span class="form-error" *ngIf="getPasswordError()" role="alert">
          {{ getPasswordError() }}
        </span>
      </div>

      <div class="form-group">
        <label class="form-label" for="reset-confirm-password">Confirme sua Senha</label>
        <input
          id="reset-confirm-password"
          class="form-input"
          [class.form-input--error]="getConfirmPasswordError()"
          type="password"
          formControlName="confirmPassword"
          placeholder="Repita sua nova senha"
          autocomplete="new-password"
        />
        <span class="form-error" *ngIf="getConfirmPasswordError()" role="alert">
          {{ getConfirmPasswordError() }}
        </span>
      </div>

      <div class="form-error form-error--block" *ngIf="resetError" role="alert">
        {{ resetError }}
        <a
          *ngIf="resetError.includes('expirado')"
          routerLink="/auth/login"
          class="error-link"
        >
          Solicitar novo link
        </a>
      </div>

      <button
        type="submit"
        class="btn btn--primary"
        [disabled]="isLoading"
      >
        <span *ngIf="isLoading" class="spinner" aria-hidden="true"></span>
        <span>{{ isLoading ? 'Redefinindo...' : 'Redefinir Senha' }}</span>
      </button>
    </form>

    <p class="auth-footer">
      <a routerLink="/auth/login" class="auth-footer__link">Voltar ao login</a>
    </p>
  </div>
</div>
