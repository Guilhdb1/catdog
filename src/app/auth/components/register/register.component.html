<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="auth-brand__icon">🐾</span>
      <span class="auth-brand__name">CatDog</span>
    </div>

    <h1 class="auth-title">Criar conta</h1>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="form-group">
        <label class="form-label" for="register-email">Email</label>
        <input
          id="register-email"
          class="form-input"
          [class.form-input--error]="getEmailError()"
          type="email"
          formControlName="email"
          placeholder="seu@email.com"
          autocomplete="email"
        />
        <span class="form-error" *ngIf="getEmailError()" role="alert">
          {{ getEmailError() }}
        </span>
      </div>

      <div class="form-group">
        <label class="form-label" for="register-password">Senha</label>
        <input
          id="register-password"
          class="form-input"
          [class.form-input--error]="getPasswordError()"
          type="password"
          formControlName="password"
          placeholder="Mínimo 7 caracteres"
          autocomplete="new-password"
        />
        <span class="form-error" *ngIf="getPasswordError()" role="alert">
          {{ getPasswordError() }}
        </span>
      </div>

      <div class="form-group">
        <label class="form-label" for="register-confirm-password">Confirme sua Senha</label>
        <input
          id="register-confirm-password"
          class="form-input"
          [class.form-input--error]="getConfirmPasswordError()"
          type="password"
          formControlName="confirmPassword"
          placeholder="Repita sua senha"
          autocomplete="new-password"
        />
        <span class="form-error" *ngIf="getConfirmPasswordError()" role="alert">
          {{ getConfirmPasswordError() }}
        </span>
      </div>

      <div class="form-error form-error--block" *ngIf="registerError" role="alert">
        {{ registerError }}
      </div>

      <button
        type="submit"
        class="btn btn--primary"
        [disabled]="isLoading"
      >
        <span *ngIf="isLoading" class="spinner" aria-hidden="true"></span>
        <span>{{ isLoading ? 'Cadastrando...' : 'Registrar' }}</span>
      </button>
    </form>

    <p class="auth-footer">
      Já tem uma conta?
      <a routerLink="/auth/login" class="auth-footer__link">Entrar</a>
    </p>
  </div>
</div>
